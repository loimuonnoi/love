<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>⚠ Warning</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial;
      background: #ff0917;
    }
    .box {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 { text-align: center; margin-top: 0; }
    .status { margin-top: 20px; color: green; font-weight: bold; }
    .warning {
      background-color: #ffe3e3;
      color: #d8000c;
      border: 1px solid #d8000c;
      padding: 10px;
      border-radius: 5px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="warning">
      <img src="https://raw.githubusercontent.com/guiyeuthuong/love/main/img/1751884407459_warning.gif" alt="Cảnh báo" style="max-width:100%; height:100px; margin-bottom:10px;">
      <p>⚠ Bạn đang cố sao chép code của Janshare, bạn không nên làm như vậy.</p>
      <p>Nếu đây là lỗi hãy trở về trang chủ <b><a href="http://Janshare.com">Janshare.com</a></b> hoặc <b><a href="http://taoanhfree.com">Taoanhfree.com</a></b></p>
      <p>Hoặc liên hệ admin qua <b><a href="https://www.facebook.com/taoanhfree">FACEBOOK</a></b></p>
    </div>

    <h2>Thông tin IP và thiết bị của bạn</h2>
    <div id="ipInfo">Đang lấy thông tin...</div>
    <div id="status" class="status"></div>
  </div>

  <audio id="alertSound" preload="auto" loop>
    <source src="https://raw.githubusercontent.com/guiyeuthuong/love/main/img/1751884214770_warning.mp3" type="audio/mpeg">
  </audio>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const alertSound = document.getElementById("alertSound");
      alertSound.play().catch(() => {
        const unlock = () => {
          alertSound.play();
          document.removeEventListener("click", unlock);
          document.removeEventListener("mousemove", unlock);
          document.removeEventListener("keydown", unlock);
        };
        document.addEventListener("click", unlock);
        document.addEventListener("mousemove", unlock);
        document.addEventListener("keydown", unlock);
      });
    });
  </script>

  <script>
    const ipAPIs = [
      async () => {
        const res = await fetch("http://ip-api.com/json/?fields=status,message,country,city,lat,lon,isp,timezone,query");
        const d = await res.json();
        if (d.status !== "success") throw new Error(d.message);
        return { ip: d.query, country: d.country, city: d.city, lat: d.lat, lon: d.lon, isp: d.isp, timezone: d.timezone };
      },
      // API 2: ipwho.is
      async () => {
        const res = await fetch("https://ipwho.is/");
        const d = await res.json();
        if (!d.success) throw new Error("ipwho failed");
        return { ip: d.ip, country: d.country, city: d.city, lat: d.latitude, lon: d.longitude, isp: d.connection?.org || "N/A", timezone: d.timezone?.id || "N/A" };
      },
      // API 3: ipapi.co
      async () => {
        const res = await fetch("https://ipapi.co/json/");
        const d = await res.json();
        if (d.error) throw new Error("ipapi failed");
        return { ip: d.ip, country: d.country_name, city: d.city, lat: d.latitude, lon: d.longitude, isp: d.org || "N/A", timezone: d.timezone || "N/A" };
      },
      // API 4: freeipapi.com
      async () => {
        const res = await fetch("https://freeipapi.com/api/json");
        const d = await res.json();
        if (!d.ipAddress) throw new Error("freeipapi failed");
        return { ip: d.ipAddress, country: d.countryName, city: d.cityName, lat: d.latitude, lon: d.longitude, isp: "N/A", timezone: d.timeZone || "N/A" };
      },
      // API 5: ipify lấy IP rồi tra ip-api
      async () => {
        const r1 = await fetch("https://api.ipify.org?format=json");
        const { ip } = await r1.json();
        const r2 = await fetch(`http://ip-api.com/json/${ip}?fields=status,country,city,lat,lon,isp,timezone,query`);
        const d = await r2.json();
        if (d.status !== "success") throw new Error("fallback failed");
        return { ip: d.query, country: d.country, city: d.city, lat: d.lat, lon: d.lon, isp: d.isp, timezone: d.timezone };
      }
    ];

    async function tryGetIP(index = 0) {
      if (index >= ipAPIs.length) {
        document.getElementById("ipInfo").innerHTML = "<span style='color:red'>Không sao chép code.</span>";
        return;
      }
      try {
        const info = await ipAPIs[index]();
        if (!info.ip) throw new Error("no ip returned");
        onIPReceived(info);
      } catch (err) {
        console.warn(`API ${index + 1} thất bại:`, err.message);
        tryGetIP(index + 1);
      }
    }

    function onIPReceived({ ip, country, city, lat, lon, isp, timezone }) {
      const referrer = document.referrer || "N/A";
      const userAgent = navigator.userAgent;

      document.getElementById("ipInfo").innerHTML = `
        <strong>IP:</strong> ${ip} <br>
        <strong>Quốc gia:</strong> ${country} <br>
        <strong>Thành phố:</strong> ${city} <br>
        <strong>Nhà mạng:</strong> ${isp} <br>
        <strong>Múi giờ:</strong> ${timezone} <br>
        <strong>Vĩ độ:</strong> ${lat} <br>
        <strong>Kinh độ:</strong> ${lon} <br>
        <strong>Thiết bị/Trình duyệt:</strong> ${userAgent}
      `;

      const fullInfo = [
        `IP: ${ip}`,
        `Quốc gia: ${country}`,
        `Thành phố: ${city}`,
        `Nhà mạng: ${isp}`,
        `Múi giờ: ${timezone}`,
        `Vĩ độ: ${lat}`,
        `Kinh độ: ${lon}`,
        `Referrer: ${referrer}`,
        `Thiết bị/Trình duyệt: ${userAgent}`
      ].join("\n");

      const formData = new FormData();
      formData.append("entry.1409582827", fullInfo);

      fetch("https://docs.google.com/forms/d/e/1FAIpQLScn2EMyqu3_YoFjp3NNzehjUY2h5p0VnZomKwxifTp5w4Bx5A/formResponse", {
        method: "POST",
        mode: "no-cors",
        body: formData
      }).then(() => {
        document.getElementById("status").innerText = "Đã gửi dữ liệu IP và thiết bị của người sao chép code về hệ thống.";
      }).catch(() => {
        document.getElementById("status").innerText = "Không thể gửi dữ liệu.";
      });
    }

    tryGetIP();
  </script>

</body>
</html>
